<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Engineering Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #readme-content h1 { @apply text-3xl font-bold mb-4 border-b pb-2 text-blue-800; }
        #readme-content h2 { @apply text-2xl font-semibold mt-6 mb-3 text-blue-700; }
        #readme-content p { @apply mb-4 text-gray-700 leading-relaxed; }
        #readme-content ul { @apply list-disc ml-6 mb-4 text-gray-700; }
        #readme-content code { @apply bg-gray-100 px-1 rounded text-pink-600; }
        #readme-content pre { @apply bg-gray-900 text-white p-4 rounded mb-4 overflow-x-auto; }
        #readme-content img { @apply max-w-full h-auto rounded-lg my-4 shadow-sm; }
        .nav-btn { @apply px-4 py-2 bg-gray-100 hover:bg-blue-100 rounded-full transition-all text-sm font-medium border border-gray-200; }
        .nav-btn.active { @apply bg-blue-600 text-white border-blue-600 shadow-md; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-200">
        <div class="bg-gradient-to-r from-blue-700 to-blue-500 p-8 text-white text-center">
            <h1 class="text-3xl font-bold">Buntungjai Project Hub</h1>
            <p class="opacity-90 mt-2">ศูนย์รวมโปรเจควิศวกรรมและ AI</p>
        </div>

        <div class="p-6 border-b flex flex-wrap gap-2 justify-center bg-gray-50" id="nav-container">
            <button class="nav-btn active" onclick="loadProject('Portfolio', this)">Main Profile</button>
            <button class="nav-btn" onclick="loadProject('Smart-Space-Monitoring-AI', this)">AI Monitoring</button>
            <button class="nav-btn" onclick="loadProject('Real-time-DHT22-Data-Pipeline-Raspberry-Pi-to-Looker-Studio', this)">IoT Pipeline</button>
            </div>

        <div id="readme-content" class="p-8 md:p-12 min-h-[400px]">
            <div class="flex justify-center items-center h-40">
                <p class="text-gray-400 animate-pulse">กำลังโหลดข้อมูลโปรเจค...</p>
            </div>
        </div>
    </div>

    <script>
        const username = 'Buntungjai';

        async function loadProject(repoName, element) {
            // เปลี่ยนสถานะปุ่มที่เลือก
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            const contentDiv = document.getElementById('readme-content');
            contentDiv.innerHTML = '<p class="text-center text-gray-400">กำลังดึงข้อมูลจาก GitHub...</p>';

            try {
                // ดึงไฟล์ README.md จาก Branch main (ถ้าบาง Repo ใช้ master ให้เปลี่ยนเป็น master)
                const url = `https://raw.githubusercontent.com/${username}/${repoName}/main/README.md`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('หาไฟล์ไม่เจอ (ลองเช็ค Branch ว่าเป็น main หรือ master)');

                const markdownText = await response.text();
                
                // แปลง Markdown เป็น HTML
                contentDiv.innerHTML = marked.parse(markdownText);
                
                // เลื่อนหน้าจอกลับขึ้นไปด้านบนของเนื้อหา
                window.scrollTo({ top: contentDiv.offsetTop - 100, behavior: 'smooth' });

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-red-500 font-bold">ขออภัย! ไม่สามารถโหลดข้อมูลได้</p>
                        <p class="text-sm text-gray-500">${error.message}</p>
                    </div>
                `;
            }
        }

        // โหลดโปรเจคแรกเป็นค่าเริ่มต้น
        window.onload = () => loadProject('Portfolio');
    </script>
</body>
</html>
