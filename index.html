<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pongsakorn Project Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown Styles */
        #readme-content h1 { @apply text-3xl font-bold mb-6 border-b pb-3 text-blue-800; }
        #readme-content h2 { @apply text-2xl font-semibold mt-8 mb-4 text-blue-700; }
        #readme-content p { @apply mb-4 text-gray-700 leading-relaxed text-lg; }
        #readme-content ul { @apply list-disc ml-8 mb-6 text-gray-700 space-y-2; }
        #readme-content code { @apply bg-gray-100 px-2 py-0.5 rounded text-pink-600 font-mono text-sm border border-gray-200; }
        #readme-content pre { @apply bg-gray-900 text-gray-100 p-5 rounded-xl mb-6 overflow-x-auto shadow-inner; }
        #readme-content img { @apply max-w-full h-auto rounded-xl my-6 shadow-md border border-gray-100; }

        /* Shared Button Style */
        .btn-base {
            @apply px-6 py-2.5 rounded-xl font-bold transition-all duration-300 text-sm flex items-center gap-2 border-2;
        }
        
        /* Tab Styles (Top) */
        .tab-inactive { @apply bg-transparent border-transparent text-gray-400 hover:text-blue-500; }
        .tab-active { @apply bg-white border-blue-100 text-blue-600 shadow-sm scale-105; }

        /* Project Button Styles (Middle) */
        .nav-btn {
            @apply px-5 py-2.5 rounded-xl font-semibold transition-all duration-300 text-sm border-2 shadow-sm;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
        <div class="bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-600 p-10 text-white text-center">
            <h1 class="text-4xl font-extrabold tracking-tight">Pongsakorn Project Hub</h1>
            <div class="h-1 w-20 bg-blue-300 mx-auto mt-4 rounded-full opacity-50"></div>
            <p class="opacity-90 mt-4 text-lg font-medium italic">ศูนย์รวมโปรเจควิศวกรรมและ AI</p>
        </div>

        <div class="flex justify-center bg-slate-50/50 border-b p-4">
            <div class="inline-flex rounded-2xl p-1.5 bg-slate-200/50 gap-2">
                <button onclick="switchTab('readme')" id="btn-readme" class="btn-base tab-active">
                    📖 Project Docs
                </button>
                <button onclick="switchTab('tools')" id="btn-tools" class="btn-base tab-inactive">
                    🧮 Engineer Tools
                </button>
            </div>
        </div>

        <div id="project-nav" class="p-8 border-b flex flex-wrap gap-4 justify-center bg-white">
            <button class="nav-btn bg-white text-slate-600 border-slate-100 hover:border-blue-200" onclick="loadProject('engineer-hub', this)">🏠 Main Profile</button>
            <button class="nav-btn bg-white text-slate-600 border-slate-100 hover:border-blue-200" onclick="loadProject('Smart-Space-Monitoring-AI', this)">🧠 AI Monitoring</button>
            <button class="nav-btn bg-white text-slate-600 border-slate-100 hover:border-blue-200" onclick="loadProject('Real-time-DHT22-Data-Pipeline-Raspberry-Pi-to-Looker-Studio', this)">📊 IoT Pipeline</button>
        </div>

        <div id="readme-content" class="p-8 md:p-14 min-h-[500px] animate-fadeIn">
            <div class="flex flex-col justify-center items-center h-60 gap-4">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-slate-400 font-medium">กำลังเตรียมข้อมูลโปรเจค...</p>
            </div>
        </div>

        <div id="tools-content" class="hidden p-8 md:p-14 bg-slate-50/30">
            <div class="max-w-md mx-auto bg-white p-8 rounded-3xl border border-slate-100 shadow-xl">
                <h3 class="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-3">
                    <span class="p-2 bg-blue-100 rounded-lg text-blue-600">🧮</span> RPM Calculator
                </h3>
                </div>
        </div>
    </div>

    <script>
        const username = 'Buntungjai';

        function switchTab(tab) {
            const readmeSec = document.getElementById('readme-content');
            const projNav = document.getElementById('project-nav');
            const toolsSec = document.getElementById('tools-content');
            const btnReadme = document.getElementById('btn-readme');
            const btnTools = document.getElementById('btn-tools');

            if (tab === 'tools') {
                readmeSec.classList.add('hidden');
                projNav.classList.add('hidden');
                toolsSec.classList.remove('hidden');
                // Switch Tab Style
                btnTools.className = "btn-base tab-active";
                btnReadme.className = "btn-base tab-inactive";
            } else {
                readmeSec.classList.remove('hidden');
                projNav.classList.remove('hidden');
                toolsSec.classList.add('hidden');
                // Switch Tab Style
                btnReadme.className = "btn-base tab-active";
                btnTools.className = "btn-base tab-inactive";
            }
        }

        async function loadProject(repoName, element) {
            // 1. Reset all Nav Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600', 'scale-105', 'shadow-md');
                btn.classList.add('bg-white', 'text-slate-600', 'border-slate-100');
            });

            // 2. Activate selected button
            if (element) {
                element.classList.remove('bg-white', 'text-slate-600', 'border-slate-100');
                element.classList.add('bg-blue-600', 'text-white', 'border-blue-600', 'scale-105', 'shadow-md');
            }

            const contentDiv = document.getElementById('readme-content');
            contentDiv.innerHTML = `
                <div class="flex flex-col justify-center items-center h-60 gap-4">
                    <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-slate-400 font-medium text-center">กำลังดึงข้อมูลจากคลัง GitHub...</p>
                </div>`;

            try {
                let url = `https://raw.githubusercontent.com/${username}/${repoName}/main/README.md`;
                let response = await fetch(url);
                if (!response.ok) {
                    url = `https://raw.githubusercontent.com/${username}/${repoName}/master/README.md`;
                    response = await fetch(url);
                }
                if (!response.ok) throw new Error('หาไฟล์ README.md ไม่เจอ');

                const markdownText = await response.text();
                contentDiv.innerHTML = marked.parse(markdownText);
                contentDiv.classList.add('animate-fadeIn');
            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="text-center py-20 bg-red-50 rounded-2xl border border-red-100">
                        <p class="text-red-500 font-bold text-xl">เกิดข้อผิดพลาด</p>
                        <p class="text-sm text-red-400 mt-2">${error.message}</p>
                    </div>`;
            }
        }

        window.onload = () => {
            const firstBtn = document.querySelector('.nav-btn');
            loadProject('engineer-hub', firstBtn);
        };
    </script>
</body>
</html>
